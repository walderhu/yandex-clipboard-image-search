<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clipboard Image Search</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <div class="header">
        <div class="mark">Y</div>
        <div>
          <h1>Clipboard Search</h1>
          <p id="status">Reading clipboard...</p>
        </div>
      </div>

      <div id="preview" class="preview hidden"></div>

      <div class="actions">
        <button id="paste" type="button" class="primary">Вставить из буфера</button>
        <button id="openYa" type="button" class="secondary">Открыть ya.ru</button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
